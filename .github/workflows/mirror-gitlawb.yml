name: Mirror to gitlawb

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install gl CLI
        run: |
          curl -fsSL https://gitlawb.com/install.sh -o /tmp/gl-install.sh
          bash /tmp/gl-install.sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Restore gitlawb identity from secrets
        env:
          GITLAWB_IDENTITY_PEM: ${{ secrets.GITLAWB_IDENTITY_PEM }}
          GITLAWB_UCAN_JSON: ${{ secrets.GITLAWB_UCAN_JSON }}
        run: |
          mkdir -p "$HOME/.gitlawb"
          chmod 700 "$HOME/.gitlawb"
          printf '%s' "$GITLAWB_IDENTITY_PEM" | base64 -d > "$HOME/.gitlawb/identity.pem"
          printf '%s' "$GITLAWB_UCAN_JSON" | base64 -d > "$HOME/.gitlawb/ucan.json"
          chmod 600 "$HOME/.gitlawb/identity.pem"

      - name: Verify identity
        env:
          GITLAWB_NODE: https://node.gitlawb.com
        run: |
          gl doctor || true
          gl identity show

      - name: Push to gitlawb mirror
        env:
          GITLAWB_NODE: https://node.gitlawb.com
        run: |
          MY_DID=$(gl identity show)
          git remote add gitlawb "gitlawb://$MY_DID/pyxis"
          # Incremental push. Initial mirror was bootstrapped via `gl mirror` once;
          # subsequent pushes are fast-forward from main. If gitlawb diverges
          # for any reason, re-bootstrap manually: gl mirror https://github.com/pyxis-app/pyxis
          git push gitlawb main
